# Beaver Bot Configuration

app:
  name: "Beaver Bot"
  version: "0.1.0"
  debug: false

model:
  provider: "minimax"  # openrouter, anthropic, openai, minimax
  model: "MiniMax-M2.7"
  api_key: "${MINIMAX_API_KEY}"
  api_base: "https://api.minimaxi.com/anthropic/v1/messages"
  max_tokens: 4096
  temperature: 0.7

github:
  token: "${GITHUB_TOKEN}"
  owner: "user-YeLei"
  repo: "beaver-bot"

cli:
  prompt: "🦫 Beaver"
  welcome_banner: |
    ╔══════════════════════════════════════╗
    ║     🦫 Beaver Bot 开发助手          ║
    ║     输入 /help 查看帮助              ║
    ╚══════════════════════════════════════╝
  colors:
    user: "cyan"
    assistant: "green"
    error: "red"
    info: "blue"

logging:
  level: "INFO"
  format: "json"

# MCP Servers Configuration
# Users can add their own MCP servers here
# Example:
# mcp_servers:
#   time:
#     command: "uvx"
#     args: ["mcp-server-time"]
#   filesystem:
#     command: "npx"
#     args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
mcp_servers: {}
